<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cisco Segédlet - Kereshető</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Megakadályozza a dupla görgetősávot */
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
        }

        /* A PDF területe */
        #pdf-viewer {
            flex: 1; /* Kitölti a maradék helyet */
            width: 100%;
            border: none;
        }

        /* ALSÓ KÉK SÁV */
        #footer-controls {
            height: 60px;
            background-color: #2980b9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.3);
            z-index: 100;
            color: white;
            font-family: sans-serif;
        }

        .info-text {
            font-weight: bold;
            font-size: 14px;
        }

        .btn-refresh {
            padding: 8px 15px;
            background: white;
            color: #2980b9;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <iframe 
        id="pdf-viewer" 
        src="Cisco_eszkozok_beallitasai.pdf#toolbar=1&navpanes=1" 
        type="application/pdf">
    </iframe>

    <div id="footer-controls">
        <div class="info-text">CISCO ESZKÖZÖK BEÁLLÍTÁSAI</div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 12px; opacity: 0.9;">Tipp: Kereséshez nyomj <b>Ctrl + F</b>-et!</span>
            <a href="Cisco_eszkozok_beallitasai.pdf" download class="btn-refresh">Letöltés</a>
        </div>
    </div>

</body>
</html>
